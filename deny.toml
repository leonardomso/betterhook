# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# All advisories are denied by default in modern cargo-deny.
# Use `ignore` to suppress specific advisories if needed.

[licenses]
# Unlicensed crates are always errors in modern cargo-deny.
# Use `clarify` to help resolve ambiguous licenses.
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
