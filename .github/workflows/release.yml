name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: betterhook
            asset: betterhook-x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary: betterhook
            asset: betterhook-aarch64-unknown-linux-gnu
            cross: true
          - target: x86_64-apple-darwin
            os: macos-13
            binary: betterhook
            asset: betterhook-x86_64-apple-darwin
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: betterhook
            asset: betterhook-aarch64-apple-darwin

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux aarch64)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Run tests
        if: "!matrix.cross"
        run: cargo test --workspace

      - name: Build release binary
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p betterhook-cli
          else
            cargo build --release --target ${{ matrix.target }} -p betterhook-cli
          fi

      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          # Extract the section for this version from CHANGELOG.md
          awk "/^## \[${TAG}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md > release_notes.md
          echo "Release notes for v${TAG}:"
          cat release_notes.md

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum */betterhook-* > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: |
            artifacts/betterhook-x86_64-unknown-linux-gnu/betterhook-x86_64-unknown-linux-gnu
            artifacts/betterhook-aarch64-unknown-linux-gnu/betterhook-aarch64-unknown-linux-gnu
            artifacts/betterhook-x86_64-apple-darwin/betterhook-x86_64-apple-darwin
            artifacts/betterhook-aarch64-apple-darwin/betterhook-aarch64-apple-darwin
            artifacts/checksums-sha256.txt
          draft: false
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
