name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: betterhook
            asset: betterhook-x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary: betterhook
            asset: betterhook-aarch64-unknown-linux-gnu
            cross: true
          - target: x86_64-apple-darwin
            os: macos-13
            binary: betterhook
            asset: betterhook-x86_64-apple-darwin
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: betterhook
            asset: betterhook-aarch64-apple-darwin

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install cross (Linux aarch64)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Run tests
        if: "!matrix.cross"
        run: cargo test --workspace

      - name: Build release binary
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p betterhook-cli
          else
            cargo build --release --target ${{ matrix.target }} -p betterhook-cli
          fi

      - name: Package binary
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.asset }}
          tar czf ${{ matrix.asset }}.tar.gz ${{ matrix.asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}.tar.gz

  completions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Build CLI
        run: cargo build --release -p betterhook-cli

      - name: Generate shell completions
        run: |
          mkdir -p completions
          ./target/release/betterhook completions bash > completions/betterhook.bash
          ./target/release/betterhook completions zsh > completions/_betterhook
          ./target/release/betterhook completions fish > completions/betterhook.fish
          tar czf betterhook-completions.tar.gz -C completions .

      - name: Upload completions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: betterhook-completions
          path: betterhook-completions.tar.gz

  release:
    needs: [build, completions]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          # Extract the section for this version from CHANGELOG.md
          awk "/^## \[${TAG}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md > release_notes.md
          echo "Release notes for v${TAG}:"
          cat release_notes.md

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum */*.tar.gz > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          body_path: release_notes.md
          files: |
            artifacts/betterhook-x86_64-unknown-linux-gnu/betterhook-x86_64-unknown-linux-gnu.tar.gz
            artifacts/betterhook-aarch64-unknown-linux-gnu/betterhook-aarch64-unknown-linux-gnu.tar.gz
            artifacts/betterhook-x86_64-apple-darwin/betterhook-x86_64-apple-darwin.tar.gz
            artifacts/betterhook-aarch64-apple-darwin/betterhook-aarch64-apple-darwin.tar.gz
            artifacts/betterhook-completions/betterhook-completions.tar.gz
            artifacts/checksums-sha256.txt
          draft: false
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}

  npm:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.22.2
          registry-url: https://registry.npmjs.org

      - name: Update npm for OIDC support
        run: npm install -g npm@latest

      - name: Sync version from git tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          cd packaging/npm
          npm version "$TAG" --no-git-tag-version --allow-same-version

      - name: Publish to npm (trusted publishing)
        run: npm publish --provenance --access public
        working-directory: packaging/npm
